modules-left = filesystem round-left bspwm round-right
modules-center = temperature gpu-temp space memory space cpu
modules-right = space battery backlight alsa xkeyboard round-left time round-right space wlan powermenu

font-0 = JetBrainsMono Nerd Font:size=12;2
font-1 = JetBrainsMono Nerd Font:size=18;5
font-2 = Material Design Icons:style=Bold:size=13;3
