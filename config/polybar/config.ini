[global/wm]
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

; Setting up the main laptop monitor
[bar/top]
monitor = ${env:MONITOR:eDP}
tray-position = right
tray-padding = 5
width = 100%
height = 42
dpi = ${env:POLYBAR_DPI:144}
padding-left = 1
padding-right = 0
background = ${colors.background}
foreground = ${colors.foreground}
bottom = false
border-top-size = 7
border-bottom-size = 7
border-top-color = ${colors.background}
border-bottom-color = ${colors.background}
offset-x = 0%
offset-y = 0%
fixed-center = true
line-size = 3
wm-restack = bspwm

modules-left = filesystem round-left bspwm round-right
modules-center = temperature gpu-temp space memory space cpu
modules-right = space battery backlight alsa xkeyboard round-left time round-right space bluetooth wlan powermenu

font-0 = JetBrainsMono Nerd Font:size=12;2
font-1 = JetBrainsMono Nerd Font:size=18;5
font-2 = Material Design Icons:style=Bold:size=13;3
font-3 = unifont:fontformat=truetype:size=13:antialias=true;
font-4 = Noto Color Emoji:scale=10;2

; –í–Ĺ–Ķ—ą–Ĺ–ł–Ļ –ľ–ĺ–Ĺ–ł—ā–ĺ—Ä (—ā–ĺ–Ľ—Ć–ļ–ĺ –ĺ–ī–ł–Ĺ –Ī–į—Ä –ľ–ĺ–∂–Ķ—ā –ī–Ķ—Ä–∂–į—ā—Ć system tray ‚ÄĒ tray –ĺ—Ā—ā–į–≤–Ľ–Ķ–Ĺ –Ĺ–į [bar/top])
